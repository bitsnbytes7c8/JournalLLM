{% extends "base.html" %}

{% block title %}{{ entry.title }} — Local Journal{% endblock %}

{% block content %}
  <div class="mb-6">
    <div class="text-sm text-slate-400">{{ entry.journal_date }}</div>
    <h1 class="text-3xl font-semibold mt-1">{{ entry.title }}</h1>
    <div class="mt-3 flex flex-wrap gap-2 text-xs">
      <span class="rounded-full border border-slate-800 bg-slate-900/40 px-3 py-1 text-slate-300">
        Mood: {{ entry.mood if entry.mood else "—" }}
      </span>
      <span class="rounded-full border border-slate-800 bg-slate-900/40 px-3 py-1 text-slate-300">
        Vector: {{ entry.vector_status }}
      </span>
    </div>
  </div>

  <div class="rounded-lg border border-slate-800 bg-slate-900/30 p-5">
    <pre class="whitespace-pre-wrap break-words font-sans text-slate-100 leading-relaxed">{{ entry.content }}</pre>
  </div>
{% endblock %}
