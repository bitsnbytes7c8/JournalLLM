<!doctype html>
<html lang="en" class="h-full bg-slate-950">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Local Journal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full text-slate-100">
    <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur">
      <div class="mx-auto max-w-4xl px-4 py-3 flex items-center justify-between">
        <a href="/" class="font-semibold tracking-tight">Local Journal</a>
        <div class="flex gap-4 text-sm">
          <a href="/" class="text-slate-200 hover:text-white">Home</a>
          <a href="/create" class="text-slate-200 hover:text-white">New Entry</a>
        </div>
      </div>
    </nav>

    <main class="mx-auto max-w-4xl px-4 py-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
